name: Python

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/python.yml'
      - 'binding/python/**'
      - '!binding/python/README.md'
      - 'lib/linux/**'
      - 'lib/mac/**'
      - 'lib/raspberry-pi/**'
      - 'lib/windows/**'
  pull_request:
    branches: [ main, 'v[0-9]+.[0-9]+' ]
    paths:
      - '.github/workflows/python.yml'
      - 'binding/python/**'
      - '!binding/python/README.md'
      - 'lib/linux/**'
      - 'lib/mac/**'
      - 'lib/raspberry-pi/**'
      - 'lib/windows/**'

defaults:
  run:
    working-directory: .

jobs:
  build-self-hosted:
    runs-on: ${{ matrix.machine }}

    strategy:
      fail-fast: false
      matrix:
        device: [ "cpu" ]
        machine: [ rpi4-32, rpi4-64, rpi5-32, rpi5-64, pv-linux, pv-ios, pv-windows, pv-windows-arm64 ]
        include:
          - device: gpu
            machine: pv-linux
          - device: gpu
            machine: pv-windows
          - device: gpu
            machine: pv-windows-igpu
    steps:
    - uses: actions/checkout@v3

    - name: Setup Python virtualenv (*nix)
      if: ${{ matrix.machine != 'pv-windows' && matrix.machine != 'pv-windows-igpu' && matrix.machine != 'pv-windows-arm64' }}
      run: |
        python3 -m venv binding/python/.venv
        . binding/python/.venv/bin/activate
        echo PATH=$PATH >> $GITHUB_ENV

    - name: Setup Python virtualenv (windows)
      if: ${{ matrix.machine == 'pv-windows' || matrix.machine == 'pv-windows-igpu' || matrix.machine == 'pv-windows-arm64' }}
      run: |
        python3 -m venv binding\python\.venv --symlinks
        binding\python\.venv\Scripts\activate
        echo PATH=$PATH >> $GITHUB_ENV

    - name: Install Python dependencies
      run: python3 -m pip install -r binding/python/requirements.txt

    - name: Download resource files
      run: |
        curl http://${{secrets.PV_CICD_RES_SERVER_AUTHORITY}}/github/picollm/res/phi2-290.pllm/06-5842035/phi2-290.pllm -o phi2-290.pllm
        curl http://${{secrets.PV_CICD_RES_SERVER_AUTHORITY}}/github/picollm/res/qwen3-vl-2b-it-329.pllm/00-5842035/qwen3-vl-2b-it-329.pllm -o qwen3-vl-2b-it-329.pllm
        curl http://${{secrets.PV_CICD_RES_SERVER_AUTHORITY}}/github/picollm/res/deepseek-ocr-2-310.pllm/00-5842035/deepseek-ocr-2-310.pllm -o deepseek-ocr-2-310.pllm
        curl http://${{secrets.PV_CICD_RES_SERVER_AUTHORITY}}/github/picollm/res/embeddinggemma-300m-137.pllm/00-5842035/embeddinggemma-300m-137.pllm -o embeddinggemma-300m-137.pllm

    - name: Test
      run: python3 -m binding.python.test_picollm ${{secrets.PV_VALID_ACCESS_KEY}} phi2-290.pllm qwen3-vl-2b-it-329.pllm deepseek-ocr-2-310.pllm embeddinggemma-300m-137.pllm ${{matrix.device}}
