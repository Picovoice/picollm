name: .NET Demos

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/dotnet-demos.yml'
      - 'demo/dotnet/**'
      - '!demo/dotnet/README.md'
  pull_request:
    branches: [ main, 'v[0-9]+.[0-9]+' ]
    paths:
      - '.github/workflows/dotnet-demos.yml'
      - 'demo/dotnet/**'
      - '!demo/dotnet/README.md'

defaults:
  run:
    working-directory: demo/dotnet/PicoLLMDemo

jobs:
  build-self-hosted:
    runs-on: ${{ matrix.machine }}

    strategy:
      fail-fast: false
      matrix:
        device: [ cpu ]
        machine: [ rpi4-32, rpi4-64, rpi5-32, rpi5-64, pv-linux, pv-ios, pv-windows, pv-windows-arm64 ]
        include:
          - device: gpu
            machine: pv-linux
          - device: gpu
            machine: pv-windows
          - device: gpu
            machine: pv-windows-igpu

    steps:
    - uses: actions/checkout@v3

    - name: Download resource files
      run: >
        curl http://${{secrets.PV_CICD_RES_SERVER_AUTHORITY}}/github/picollm/res/phi2-290.pllm/06-5842035/phi2-290.pllm -o phi2-290.pllm &&
        curl http://${{secrets.PV_CICD_RES_SERVER_AUTHORITY}}/github/picollm/res/deepseek-ocr-2-310.pllm/00-5842035/deepseek-ocr-2-310.pllm -o deepseek-ocr-2-310.pllm

    - name: Package restore
      run: dotnet restore

    # *********** REMOVE AFTER RELEASE **********************
    - name: Pack binding for local ref
      run: dotnet pack -c Release
      working-directory: binding/dotnet

    - name: Add binding to demo
      run: dotnet add package -s ../../../binding/dotnet/PicoLLM/bin/Release PicoLLM
    # ******************************************************

    - name: Build completion demo
      run: dotnet build -c CompletionDemo.Release

    - name: Run completion demo
      run: dotnet run -c CompletionDemo.Release -- --access_key ${{secrets.PV_VALID_ACCESS_KEY}} --model_path phi2-290.pllm --completion_token_limit 10 --prompt "Hello my name is" --device ${{matrix.device}}

    - name: Build ocr demo
      run: dotnet build -c OCRDemo.Release

    - name: Run ocr demo
      run: dotnet run -c OCRDemo.Release -- --access_key ${{secrets.PV_VALID_ACCESS_KEY}} --model_path deepseek-ocr-2-310.pllm --completion_token_limit 10 --image_path ../../../resources/.test/images/test_image.png --device ${{matrix.device}}
