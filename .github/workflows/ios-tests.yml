name: iOS Tests

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/ios-tests.yml'
      - 'binding/ios/PicoLLMAppTest/**'
      - 'resources/.test/**'
  pull_request:
    branches: [ main, 'v[0-9]+.[0-9]+' ]
    paths:
      - '.github/workflows/ios-tests.yml'
      - 'binding/ios/PicoLLMAppTest/**'
      - 'resources/.test/**'

defaults:
  run:
    working-directory: binding/ios/PicoLLMAppTest

jobs:
  build:
    name: Run iOS Tests
    runs-on: pv-ios

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Inject AccessKey
        run: sed -i '.bak' 's:{TESTING_ACCESS_KEY_HERE}:${{secrets.PV_VALID_ACCESS_KEY}}:'
          PicoLLMAppTestUITests/BaseTest.swift

      - name: Inject Device
        run: sed -i '.bak' 's:{TESTING_DEVICE_HERE}:cpu\:1:'
          PicoLLMAppTestUITests/BaseTest.swift

      - name: Inject Model Resource URL
        run: sed -i '.bak' 's?{TESTING_MODEL_URL_HERE}?http://${{secrets.PV_CICD_RES_SERVER_AUTHORITY}}/github/picollm/res/phi2-290.pllm/06-5842035/phi2-290.pllm?'
          PicoLLMAppTestUITests/BaseTest.swift

      - name: Inject Image Model Resource URL
        run: sed -i '.bak' 's?{TESTING_IMAGE_MODEL_URL_HERE}?http://${{secrets.PV_CICD_RES_SERVER_AUTHORITY}}/github/picollm/res/qwen3-vl-2b-it-329.pllm/00-5842035/qwen3-vl-2b-it-329.pllm?'
          PicoLLMAppTestUITests/BaseTest.swift

      - name: Inject Embedding Model Resource URL
        run: sed -i '.bak' 's?{TESTING_EMBEDDING_MODEL_URL_HERE}?http://${{secrets.PV_CICD_RES_SERVER_AUTHORITY}}/github/picollm/res/embeddinggemma-300m-137.pllm/00-5842035/embeddinggemma-300m-137.pllm?'
          PicoLLMAppTestUITests/BaseTest.swift

      - name: Inject OCR Model Resource URL
        run: sed -i '.bak' 's?{TESTING_OCR_MODEL_URL_HERE}?http://${{secrets.PV_CICD_RES_SERVER_AUTHORITY}}/github/picollm/res/deepseek-ocr-2-310.pllm/00-5842035/deepseek-ocr-2-310.pllm?'
          PicoLLMAppTestUITests/BaseTest.swift

      - name: XCode Build
        run: xcrun xcodebuild build-for-testing
          -configuration Debug
          -project PicoLLMAppTest.xcodeproj
          -sdk iphoneos
          -scheme PicoLLMAppTest
          -derivedDataPath ddp
          CODE_SIGNING_ALLOWED=NO

      - name: Run Tests on Simulator
        run: xcrun xcodebuild test
          -project PicoLLMAppTest.xcodeproj
          -scheme PicoLLMAppTest
          -destination 'platform=iOS Simulator,name=iPhone 13,OS=16.4'
