name: Android Tests

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/android-tests.yml'
      - 'binding/android/PicoLLM/**'
      - 'binding/android/PicoLLMTestApp/**'
      - '!binding/android/PicoLLM/README.md'
  pull_request:
    branches: [ main, 'v[0-9]+.[0-9]+']
    paths:
      - '.github/workflows/android-tests.yml'
      - 'binding/android/PicoLLM/**'
      - 'binding/android/PicoLLMTestApp/**'
      - '!binding/android/PicoLLM/README.md'

defaults:
  run:
    working-directory: binding/android/PicoLLMTestApp

jobs:
  test:
    name: Run Android Tests
    runs-on: pv-android

    steps:
    - uses: actions/checkout@v3

    ############## REMOVE AFTER RELEASE ##########################
    - name: Set up Java 11
      uses: actions/setup-java@v3
      with:
        java-version: 11
        distribution: 'temurin'

    - name: Build binding
      run: ./gradlew assembleRelease --info
      working-directory: binding/android/PicoLLM
    ############## REMOVE AFTER RELEASE ##########################

    - name: Set up Java 21
      uses: actions/setup-java@v3
      with:
        java-version: 21
        distribution: 'temurin'

    - name: Uninstall previous app
      run: ~/Android/Sdk/platform-tools/adb shell pm uninstall ai.picovoice.picollm.testapp || true

    - name: Uninstall previous tests
      run: ~/Android/Sdk/platform-tools/adb shell pm uninstall ai.picovoice.picollm.testapp.test || true

    - name: Download model file
      run: curl http://${{secrets.PV_CICD_RES_SERVER_AUTHORITY}}/github/picollm/res/phi2-290.pllm/06-5842035/phi2-290.pllm -o phi2-290.pllm

    - name: Download image model file
      run: curl http://${{secrets.PV_CICD_RES_SERVER_AUTHORITY}}/github/picollm/res/qwen3-vl-2b-it-329.pllm/00-5842035/qwen3-vl-2b-it-329.pllm -o qwen3-vl-2b-it-329.pllm

    - name: Download embedding model file
      run: curl http://${{secrets.PV_CICD_RES_SERVER_AUTHORITY}}/github/picollm/res/embeddinggemma-300m-137.pllm/00-5842035/embeddinggemma-300m-137.pllm -o embeddinggemma-300m-137.pllm

    - name: Download ocr model file
      run: curl http://${{secrets.PV_CICD_RES_SERVER_AUTHORITY}}/github/picollm/res/deepseek-ocr-2-310.pllm/00-5842035/deepseek-ocr-2-310.pllm -o deepseek-ocr-2-310.pllm

    - name: Make Android dir
      run: ~/Android/Sdk/platform-tools/adb shell mkdir -p /sdcard/Android/data/ai.picovoice.picollm.testapp/files/external

    - name: Copy model file
      run: ~/Android/Sdk/platform-tools/adb push --sync phi2-290.pllm /sdcard/Android/data/ai.picovoice.picollm.testapp/files/external/phi2-290.pllm

    - name: Copy image model file
      run: ~/Android/Sdk/platform-tools/adb push --sync qwen3-vl-2b-it-329.pllm /sdcard/Android/data/ai.picovoice.picollm.testapp/files/external/qwen3-vl-2b-it-329.pllm

    - name: Copy embedding model file
      run: ~/Android/Sdk/platform-tools/adb push --sync embeddinggemma-300m-137.pllm /sdcard/Android/data/ai.picovoice.picollm.testapp/files/external/embeddinggemma-300m-137.pllm

    - name: Copy ocr model file
      run: ~/Android/Sdk/platform-tools/adb push --sync deepseek-ocr-2-310.pllm /sdcard/Android/data/ai.picovoice.picollm.testapp/files/external/deepseek-ocr-2-310.pllm

    - name: Inject AccessKey
      run: echo pvTestingAccessKey="${{secrets.PV_VALID_ACCESS_KEY}}" >> local.properties

    - name: Inject model name
      run: echo pvTestingModelName="phi2-290.pllm" >> local.properties

    - name: Inject image model name
      run: echo pvTestingImageModelName="qwen3-vl-2b-it-329.pllm" >> local.properties

    - name: Inject embedding model name
      run: echo pvTestingEmbeddingModelName="embeddinggemma-300m-137.pllm" >> local.properties

    - name: Inject ocr model name
      run: echo pvTestingOcrModelName="deepseek-ocr-2-310.pllm" >> local.properties

    - name: Inject device string
      run: echo pvTestingDevice="cpu" >> local.properties

    - name: Inject Android keystore variables
      run: |
        echo storePassword="${{secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD}}" >> local.properties
        echo keyPassword="${{secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD}}" >> local.properties
        echo keyAlias=picovoice >> local.properties
        echo storeFile=../picovoice.jks >> local.properties

    - name: Setup Android keystore file
      run: echo "${{secrets.ANDROID_RELEASE_KEYSTORE_FILE_B64}}" | base64 -d > picovoice.jks

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build app
      run: ./gradlew assembleDebug --info

    - name: Build androidTest
      run: ./gradlew assembleAndroidTest --info

    - name: Run tests
      run: ./gradlew connectedAndroidTest --info -Pandroid.testInstrumentationRunnerArguments.class=ai.picovoice.picollm.testapp.PicoLLMTest

